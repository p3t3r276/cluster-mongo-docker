services:
  mongo1:
    image: mongo:7.0
    container_name: mongo1
    hostname: mongo1
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo1_data:/data/db
      - ./mongo-keyfile:/data/keyfile:ro
    # command: mongod --replSet rs0 --bind_ip_all --keyFile /data/keyfile --port 27017
    command:
      - bash
      - -c
      - |
        cp /data/keyfile /tmp/mongo-keyfile
        chmod 400 /tmp/mongo-keyfile
        chown mongodb:mongodb /tmp/mongo-keyfile
        exec docker-entrypoint.sh mongod --replSet rs0 --keyFile /tmp/mongo-keyfile --auth --bind_ip_all --port 27017
    healthcheck:
      test: mongosh --host localhost:27017 -u ${MONGO_ROOT_USER} -p ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - mongo-net

  mongo2:
